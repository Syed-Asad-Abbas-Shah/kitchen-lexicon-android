<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="100%" height="240" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="bg-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e152a" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F52FF" />
      <stop offset="50%" stop-color="#3DDC84" />
      <stop offset="100%" stop-color="#1D99F3" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>

    <!-- Engineering Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" class="grid-line" stroke-width="0.75" />
      <circle cx="0" cy="0" r="1" class="grid-dot" />
    </pattern>
  </defs>

  <style>
    /* Light Mode (Default) Styles */
    .bg { fill: url(#bg-grad-light); transition: fill 0.3s ease; }
    .grid-line { stroke: rgba(148, 163, 184, 0.08); }
    .grid-dot { fill: rgba(148, 163, 184, 0.15); }
    
    /* Typography */
    .title-name { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-size: 38px; font-weight: 800; fill: #0f172a; letter-spacing: -0.5px; }
    .title-label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #64748b; letter-spacing: 3px; text-transform: uppercase; }
    .tagline { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #475569; font-weight: 400; line-height: 1.6; }
    .tagline-bold { font-weight: 600; fill: #0f172a; }
    
    /* Decorative Elements */
    .accent-bar { fill: url(#accent-grad); }
    .phone-outline { fill: none; stroke: #e2e8f0; stroke-width: 2; rx: 16px; }
    .ui-element { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; rx: 6px; }
    .ui-accent { fill: #7F52FF; opacity: 0.15; rx: 4px; }
    .ui-text { fill: #94a3b8; rx: 2px; }
    .ui-text-accent { fill: #7F52FF; rx: 2px; }
    .app-icon { fill: #7F52FF; filter: url(#glow-purple); }

    /* Dark Mode Override */
    @media (prefers-color-scheme: dark) {
      .bg { fill: url(#bg-grad-dark); }
      .grid-line { stroke: rgba(255, 255, 255, 0.025); }
      .grid-dot { fill: rgba(255, 255, 255, 0.04); }
      .title-name { fill: #f8fafc; }
      .title-label { fill: #3DDC84; }
      .tagline { fill: #94a3b8; }
      .tagline-bold { fill: #f8fafc; }
      .phone-outline { stroke: #1e293b; }
      .ui-element { fill: #0f172a; stroke: #1e293b; }
      .ui-accent { fill: #3DDC84; opacity: 0.1; }
      .ui-text { fill: #334155; }
      .ui-text-accent { fill: #3DDC84; }
    }
  </style>

  <!-- Card Background -->
  <rect width="100%" height="100%" rx="16" class="bg" />
  
  <!-- Grid Pattern -->
  <rect width="100%" height="100%" rx="16" fill="url(#grid)" />

  <!-- Mockup Phone Layout (Right Side) -->
  <g transform="translate(640, 25)" opacity="0.9">
    <!-- Phone Device Frame -->
    <rect x="0" y="0" width="130" height="190" rx="18" class="phone-outline" />
    <!-- Speaker / Notch -->
    <rect x="45" y="6" width="40" height="4" rx="2" fill="#475569" opacity="0.6" />
    
    <!-- Screen Content -->
    <!-- App Header -->
    <rect x="10" y="18" width="110" height="20" class="ui-element" />
    <circle cx="20" cy="28" r="4" class="app-icon" />
    <rect x="30" y="25" width="45" height="6" class="ui-text-accent" />
    
    <!-- Search Bar -->
    <rect x="10" y="44" width="110" height="16" class="ui-element" />
    <rect x="18" y="50" width="60" height="4" class="ui-text" />
    
    <!-- Quiz Card -->
    <rect x="10" y="66" width="110" height="48" class="ui-element" />
    <rect x="10" y="66" width="110" height="12" class="ui-accent" />
    <rect x="18" y="70" width="40" height="4" fill="#7F52FF" opacity="0.8" rx="1" />
    <rect x="18" y="84" width="75" height="4" class="ui-text" />
    <rect x="18" y="92" width="60" height="4" class="ui-text" />
    <rect x="18" y="100" width="30" height="4" class="ui-text" />

    <!-- Grid items -->
    <rect x="10" y="120" width="52" height="32" class="ui-element" />
    <rect x="16" y="126" width="20" height="4" class="ui-text" />
    <circle cx="44" cy="136" r="6" fill="#3DDC84" opacity="0.7" />

    <rect x="68" y="120" width="52" height="32" class="ui-element" />
    <rect x="74" y="126" width="20" height="4" class="ui-text" />
    <circle cx="102" cy="136" r="6" fill="#7F52FF" opacity="0.7" />
    
    <!-- Navigation Bar -->
    <rect x="10" y="158" width="110" height="22" class="ui-element" />
    <circle cx="37" cy="169" r="5" fill="#7F52FF" opacity="0.8" />
    <circle cx="65" cy="169" r="5" class="ui-text" />
    <circle cx="93" cy="169" r="5" class="ui-text" />
  </g>

  <!-- Left Content Panel -->
  <g transform="translate(50, 0)">
    <!-- Accent Bar -->
    <rect x="0" y="45" width="4" height="150" rx="2" class="accent-bar" />

    <g transform="translate(20, 0)">
      <!-- Subtitle/Label -->
      <text x="0" y="65" class="title-label">Native Android Application</text>
      
      <!-- Main Title -->
      <text x="0" y="110" class="title-name">🍳 KitchenLexicon</text>
      
      <!-- Description -->
      <text x="0" y="145" class="tagline">An interactive glossary of kitchen utensils styled with <tspan class="tagline-bold">Material 3</tspan>,</text>
      <text x="0" y="165" class="tagline">featuring custom canvas vectors, native TTS, and offline audio synthesis.</text>
      
      <!-- Monospace Tech Badges -->
      <g transform="translate(0, 185)">
        <g transform="translate(0, 0)">
          <rect x="0" y="0" width="85" height="24" class="badge-bg" />
          <text x="10" y="16" class="badge-text" style="font-family: 'Fira Code', monospace; font-size: 11px; fill: #7F52FF;">UI: COMPOSE</text>
        </g>
        <g transform="translate(95, 0)">
          <rect x="0" y="0" width="95" height="24" class="badge-bg" />
          <text x="10" y="16" class="badge-text" style="font-family: 'Fira Code', monospace; font-size: 11px; fill: #7F52FF;">LANG: KOTLIN</text>
        </g>
        <g transform="translate(200, 0)">
          <rect x="0" y="0" width="80" height="24" class="badge-bg" />
          <text x="10" y="16" class="badge-text" style="font-family: 'Fira Code', monospace; font-size: 11px; fill: #7F52FF;">SDK: API_36</text>
        </g>
        <g transform="translate(290, 0)">
          <rect x="0" y="0" width="105" height="24" class="badge-bg" />
          <text x="10" y="16" class="badge-text" style="font-family: 'Fira Code', monospace; font-size: 11px; fill: #7F52FF;">BUILD: GRADLE</text>
        </g>
      </g>
    </g>
  </g>
</svg>
